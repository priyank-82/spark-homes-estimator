<title>Spark Homes Estimator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#f59e0b;--amber-light:#fbbf24;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;--slate-200:#e2e8f0;--slate-100:#f1f5f9;--green:#22c55e;--red:#ef4444;--blue:#3b82f6}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
header{background:var(--slate-800);color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:30;position:relative;min-height:56px}
header h1{font-size:18px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .logo{width:28px;height:28px;background:var(--amber);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--slate-800);flex-shrink:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;touch-action:manipulation;white-space:nowrap}
.btn:active{transform:scale(0.95)}.btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-icon{padding:8px;border-radius:8px;background:transparent;border:none;color:white;cursor:pointer;touch-action:manipulation}
.btn-icon:active{background:rgba(255,255,255,.15)}
.btn-primary{background:var(--amber);color:var(--slate-800)}
.btn-primary:hover{background:var(--amber-light)}
.btn-secondary{background:var(--slate-700);color:white}
.btn-secondary:hover{background:var(--slate-600)}
.btn-danger{background:#ef4444;color:white}
.btn-ghost{background:transparent;color:var(--slate-700);border:1px solid var(--slate-200)}
.btn-ghost:hover{background:var(--slate-100)}
.summary-section{font-size:13px;padding:10px 16px;border-bottom:1px solid var(--slate-100);display:flex;justify-content:space-between;align-items:center}.summary-section:last-child{border-bottom:none;font-weight:700}.summary-section .ss-label{color:var(--slate-600)}.summary-section .ss-value{font-weight:600}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:white;border-radius:12px;margin:6px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;transition:box-shadow .2s,transform .15s}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;gap:8px;-webkit-tap-highlight-color:transparent}
.card-header:active{background:var(--slate-100)}
.card-header h3{font-size:15px;font-weight:600;flex:1}
.card-header .arrow{transition:transform .3s cubic-bezier(.4,0,.2,1);font-size:12px;color:var(--slate-600)}
.card-header .arrow.open{transform:rotate(180deg)}
.group-content{display:none;border-top:1px solid var(--slate-100)}
.group-content.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:var(--slate-100);color:var(--slate-600)}
.badge-amber{background:#fef3c7;color:#92400e}
.item-row{display:grid;grid-template-columns:1fr 60px 70px 70px;gap:6px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--slate-100);font-size:13px;transition:background .15s}
.item-row:last-child{border-bottom:none}
.item-row.selected{background:#fffbeb}
.item-name{font-weight:500;word-break:break-word;line-height:1.3}
.item-unit{font-size:11px;color:var(--slate-600);margin-top:1px}
.item-qty input{width:100%;padding:4px 6px;border:1px solid var(--slate-200);border-radius:6px;font-size:13px;text-align:center;background:white;-webkit-appearance:none}
.item-qty input:focus{outline:2px solid var(--amber);border-color:transparent;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.item-cost{text-align:right;font-weight:600;font-size:13px;white-space:nowrap}
.item-total{text-align:right;font-weight:700;font-size:13px;white-space:nowrap;color:var(--slate-800)}
.bottom-bar{position:sticky;bottom:0;background:white;border-top:2px solid var(--amber);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:20;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.total-label{font-size:13px;color:var(--slate-600)}
.total-amount{font-size:22px;font-weight:800;color:var(--slate-800);transition:color .2s}
.total-amount .currency{font-size:14px;font-weight:600;color:var(--slate-600)}
.progress-bar{height:4px;background:var(--slate-200);border-radius:2px;overflow:hidden;margin:0 12px 4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#4ade80);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-text{font-size:11px;color:var(--slate-600);padding:2px 12px 8px}
.tab-bar{display:flex;background:var(--slate-800);padding:4px 8px;gap:4px;flex-shrink:0}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:500;color:rgba(255,255,255,.6);border:none;background:transparent;border-radius:8px;cursor:pointer;touch-action:manipulation;transition:all .15s;font-family:inherit}
.tab.active{background:rgba(255,255,255,.15);color:white}
.tab:active{background:rgba(255,255,255,.1)}
.tab:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOverlay .2s ease}
@keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal label{display:block;font-size:13px;font-weight:600;color:var(--slate-600);margin-bottom:4px;margin-top:12px}
.modal input[type=text],.modal input[type=number],.modal select{width:100%;padding:10px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:15px;background:white;-webkit-appearance:none}
.modal input:focus{outline:2px solid var(--amber);border-color:transparent;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.modal .btn-row{display:flex;gap:8px;margin-top:20px}
.modal .btn-row .btn{flex:1}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px}
.photo-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--slate-100)}
.photo-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.photo-item .del-photo{position:absolute;top:4px;right:4px;width:24px;height:24px;background:rgba(0,0,0,.6);border:none;border-radius:50%;color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.photo-item .del-photo:active{background:rgba(239,68,68,.8)}
.photo-item .swipe-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.4);padding:2px 8px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .3s}
.photo-item.swiped .swipe-hint{opacity:1}
.photo-item.deleting{animation:swipeOut .3s ease forwards}
@keyframes swipeOut{to{transform:translateX(-120%);opacity:0}}
.room-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;touch-action:manipulation;transition:all .15s;border:1.5px solid var(--slate-200);background:white;color:var(--slate-700)}
.room-chip .del-chip{width:16px;height:16px;border-radius:50%;border:none;background:var(--slate-200);color:var(--slate-600);font-size:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:2px}
.room-chip .del-chip:active{background:var(--red);color:white}
.no-action{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;color:var(--slate-600);border-bottom:1px solid var(--slate-100)}
.no-action input[type=checkbox]:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.empty-state{text-align:center;padding:40px 20px;color:var(--slate-600)}
.empty-state h2{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--slate-800)}
.empty-state p{font-size:14px;line-height:1.5}
.empty-state .btn{margin-top:16px}
.price-input{width:100%;padding:4px 6px;border:1px solid var(--slate-200);border-radius:6px;font-size:12px;text-align:right;background:transparent}
.price-input:focus{outline:2px solid var(--amber);border-color:transparent;background:white;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.override-badge{position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--amber);border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;color:var(--slate-800);font-weight:700;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media(min-width:481px){#app{max-width:480px;margin:0 auto;border-left:1px solid var(--slate-200);border-right:1px solid var(--slate-200)}}
@media(max-width:380px){.item-row{grid-template-columns:1fr 50px 55px 55px;font-size:12px}}
@media(max-width:360px){.item-row{grid-template-columns:1fr;gap:4px;padding:8px 12px}.item-row>div:not(:first-child){display:flex;align-items:center;gap:8px;padding-left:32px}.item-cost{text-align:left}.item-total{text-align:left}}
@media(display-mode:standalone){header{padding-top:env(safe-area-inset-top,12px)}}
input[type=checkbox]{width:18px;height:18px;accent-color:var(--amber);cursor:pointer;flex-shrink:0}
input[type=checkbox]:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.quick-access{display:flex;gap:6px;padding:4px 12px;flex-wrap:wrap}
.deal-analyzer{background:linear-gradient(135deg,#1e293b,#334155);color:white;border-radius:12px;padding:16px;margin:8px 12px}
.deal-analyzer h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--amber)}
.deal-analyzer .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.1)}
.deal-analyzer .row.total{font-size:16px;font-weight:800;border-bottom:none;padding-top:10px;border-top:2px solid var(--amber);margin-top:6px}
.deal-analyzer .row .label{color:rgba(255,255,255,.7)}
.deal-analyzer .row .value{font-weight:600}
.deal-analyzer .positive{color:#4ade80}
.deal-analyzer .negative{color:#f87171}
.deal-analyzer input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:8px 10px;border-radius:8px;font-size:14px;width:100%;margin-top:4px;-webkit-appearance:none}
.deal-analyzer input:focus{outline:2px solid var(--amber);border-color:transparent}
.deal-analyzer input::placeholder{color:rgba(255,255,255,.4)}
.deal-analyzer .cost-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.deal-analyzer .cost-row>div{flex:1;min-width:80px}
.deal-analyzer .cost-row label{font-size:11px;color:rgba(255,255,255,.5);display:block;margin-bottom:2px}
.deal-analyzer .cost-row input{font-size:12px;padding:6px 8px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;animation:toastIn .3s ease;max-width:380px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.project-item{transition:opacity .3s,transform .3s;cursor:pointer}
.project-item.deleting{animation:fadeOut .25s ease forwards}
@keyframes fadeOut{to{opacity:0;transform:translateX(-30px)}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo" aria-hidden="true">S</div>
    <h1 id="appTitle">Spark Estimator</h1>
    <button class="btn-icon" id="menuBtn" data-action="menu" aria-label="Project menu">&#8942;</button>
    <button class="btn-icon" id="backBtn" data-action="back" aria-label="Back to project list" style="display:none">&#8592;</button>
  </header>
  <div class="progress-bar" id="topProgressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 groups complete</div>
  <div id="projectListView" class="scroll">
    <div style="padding:16px 12px 8px">
      <button class="btn btn-primary" data-action="new-project" style="width:100%">+ New Project</button>
    </div>
    <div id="projectList"></div>
  </div>
  <div id="projectView" class="scroll" style="display:none">
    <div id="dealAnalyzer" class="deal-analyzer" style="display:none">
      <h3>&#128176; Deal Analyzer</h3>
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <label style="font-size:12px;color:rgba(255,255,255,.6)">ARV (After Repair Value)</label>
          <input type="number" id="arvInput" data-action="deal-input" data-field="arv" placeholder="$0" step="1000" inputmode="numeric">
        </div>
        <div style="flex:1">
          <label style="font-size:12px;color:rgba(255,255,255,.6)">Purchase Price</label>
          <input type="number" id="purchaseInput" data-action="deal-input" data-field="purchase" placeholder="$0" step="1000" inputmode="numeric">
        </div>
      </div>
      <div class="cost-row">
        <div>
          <label>Closing Costs (%)</label>
          <input type="number" id="closingPctInput" data-action="deal-input" data-field="closingPct" placeholder="3" step="0.1" min="0" max="20" inputmode="decimal">
        </div>
        <div>
          <label>Monthly Holding</label>
          <input type="number" id="monthlyHoldInput" data-action="deal-input" data-field="monthlyHold" placeholder="1200" step="100" min="0" inputmode="numeric">
        </div>
        <div>
          <label>Months Held</label>
          <input type="number" id="monthsHeldInput" data-action="deal-input" data-field="monthsHeld" placeholder="6" step="1" min="0" inputmode="numeric">
        </div>
        <div>
          <label>Selling Costs (%)</label>
          <input type="number" id="sellingPctInput" data-action="deal-input" data-field="sellingPct" placeholder="6" step="0.1" min="0" max="15" inputmode="decimal">
        </div>
      </div>
      <div id="dealResults"></div>
    </div>
    <div id="sectionsContainer"></div>
    <div style="height:80px"></div>
  </div>
  <div id="photoView" class="scroll" style="display:none">
    <div style="padding:12px">
      <button class="btn btn-primary" data-action="add-photo" style="width:100%">+ Take Photo</button>
      <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none">
    </div>
    <div class="photo-grid" id="photoGrid"></div>
    <div style="height:80px"></div>
  </div>
  <div id="settingsView" class="scroll" style="display:none">
    <div class="card" style="padding:16px;margin:8px 12px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Global Price Overrides</h3>
      <p style="font-size:12px;color:var(--slate-600);margin-bottom:12px">Default prices for all new projects. Per-project overrides still apply on top.</p>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-ghost btn-sm" data-action="import-csv" style="flex:1">Import from CSV</button>
        <button class="btn btn-ghost btn-sm" data-action="reset-global-prices" style="flex:1">Reset All</button>
      </div>
      <input type="file" accept=".csv" id="csvInput" style="display:none">
      <div id="globalPricesList"></div>
    </div>
    <div class="card" style="padding:16px;margin:8px 12px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">About</h3>
      <p style="font-size:13px;color:var(--slate-600)">Spark Homes Repair Estimator v3.0<br>Built for the Spark Homes Developer Contest.</p>
    </div>
    <div style="height:80px"></div>
  </div>
  <div class="tab-bar" id="tabBar" role="tablist">
    <button class="tab active" data-action="tab" data-tab="items" role="tab" aria-selected="true">&#128221; Items</button>
    <button class="tab" data-action="tab" data-tab="photos" role="tab" aria-selected="false">&#128247; <span id="photoCountLabel">Photos (<span id="photoCount">0</span>)</span></button>
    <button class="tab" data-action="tab" data-tab="analyzer" role="tab" aria-selected="false">&#128176; Deal</button>
    <button class="tab" data-action="tab" data-tab="settings" role="tab" aria-selected="false">&#9881; Prices</button>
  </div>
  <div class="bottom-bar" id="bottomBar">
    <div>
      <div class="total-label">Total Estimate</div>
      <div class="total-amount"><span class="currency">$</span><span id="grandTotal">0</span></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-secondary btn-sm" data-action="export">Export</button>
      <button class="btn btn-primary btn-sm" data-action="show-rooms">Rooms</button>
    </div>
  </div>
</div>
<div id="modalOverlay" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div class="modal" id="modalContent"></div>
</div>

let state = {projects:{},currentId:null,activeTab:'items',globalPrices:{}};
let currentProject = null;
let photoDB = null;
let _lastFocus = null;

function openDB(){
return new Promise((res,rej)=>{
const r=indexedDB.open('SparkPhotos',1);
r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos',{keyPath:'id'})};
r.onsuccess=e=>{photoDB=e.target.result;res(photoDB)};
r.onerror=e=>{photoDB=null;res(null)};
});
}

function dbPut(id,data){
return new Promise((res,rej)=>{
if(!photoDB){toast('Photo storage unavailable');res(false);return}
try{
const tx=photoDB.transaction('photos','readwrite');
tx.objectStore('photos').put({id,data});
tx.oncomplete=()=>res(true);
tx.onerror=()=>{toast('Failed to save photo');res(false)};
}catch(e){toast('Photo save error');res(false)}
});
}

function dbGet(id){
return new Promise((res,rej)=>{
if(!photoDB){res(null);return}
try{
const tx=photoDB.transaction('photos','readonly');
const req=tx.objectStore('photos').get(id);
req.onsuccess=()=>res(req.result?req.result.data:null);
req.onerror=()=>res(null);
}catch(e){res(null)}
});
}

function dbDelete(id){
return new Promise((res,rej)=>{
if(!photoDB){res(false);return}
try{
const tx=photoDB.transaction('photos','readwrite');
tx.objectStore('photos').delete(id);
tx.oncomplete=()=>res(true);
tx.onerror=()=>res(false);
}catch(e){res(false)}
});
}

if('indexedDB' in window)openDB().catch(()=>{});

function loadState(){
try{
const s = localStorage.getItem('sparkState');
if(s){state=JSON.parse(s);if(!state.globalPrices)state.globalPrices={};if(!state.activeTab)state.activeTab='items'}
if(state.projects){Object.values(state.projects).forEach(p=>{if(!p.dealState)p.dealState={}})}
}catch(e){}
}

function saveState(){
try{localStorage.setItem('sparkState',JSON.stringify(state))}catch(e){}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function getItemCost(itemId){
if(currentProject && currentProject.priceOverrides && currentProject.priceOverrides[itemId]!==undefined)
return currentProject.priceOverrides[itemId];
if(state.globalPrices[itemId]!==undefined)return state.globalPrices[itemId];
const item=ITEMS.find(i=>i.id===itemId);
return item?item.cost:0;
}

function createProject(name){
const id=uid();
const proj={
id,name,createdAt:Date.now(),updatedAt:Date.now(),
rooms:[],roomCounts:{bathroom:0,bedroom:0,living:0,kitchen:0},
items:{},customItems:[],photos:[],notes:'',priceOverrides:{},dealState:{}
};
ITEMS.forEach(it=>{proj.items[it.id]={qty:1,checked:false}});
state.projects[id]=proj;
state.currentId=id;
saveState();
return proj;
}

function getProject(){return state.projects[state.currentId]||null}

function itemStateKey(itemId,roomId){return roomId?roomId+'::'+itemId:itemId}

function getItemState(proj,itemId,roomId){
const key=itemStateKey(itemId,roomId);
if(!proj.items[key])proj.items[key]={qty:1,checked:false};
return proj.items[key];
}

function getTotal(proj){
if(!proj)return 0;
let total=0;
Object.entries(proj.items).forEach(([key,it])=>{
if(it.checked){
const itemId=key.includes('::')?key.split('::')[1]:key;
const cost=getItemCost(itemId);
total+=cost*(it.qty||1);
}
});
proj.customItems.forEach(it=>{if(it.checked)total+=it.cost*(it.qty||1)});
return total;
}

function countGroups(proj){
if(!proj)return{complete:0,total:0};
const roomGroups=getAllRoomGroups(proj);
let total=roomGroups.length;
let complete=0;
roomGroups.forEach(rg=>{
const items=getItemsForGroup(rg);
if(items.length===0){complete++;return}
const checked=items.some(it=>{
if(it._custom)return it.checked;
const st=getItemState(proj,it.id,rg.roomId);
return st.checked;
});
if(checked)complete++;
});
return{complete,total};
}

function getAllRoomGroups(proj){
if(!proj)return[];
const groups=[];
SECTIONS.forEach(sec=>{sec.groups.forEach(g=>{groups.push({type:'core',sectionId:sec.id,groupId:g,label:GROUP_LABELS[g]||g,prefix:''})})});
proj.rooms.forEach(room=>{
const rt=ROOM_TYPES[room.type];
if(rt){rt.groups.forEach(g=>{groups.push({type:'room',roomId:room.id,sectionId:room.type,groupId:g,label:GROUP_LABELS[g]||g,prefix:room.label+': '})})}
});
return groups;
}

function getItemsForGroup(rg){
const items=ITEMS_BY_GROUP[rg.groupId];
if(items)return items.map(it=>({...it}));
const virt=VIRTUAL_GROUPS[rg.groupId];
if(virt&&virt.source){
const src=ITEMS_BY_GROUP[virt.source];
if(src)return src.map(it=>({...it}));
}
return [];
}

function isGroupNoAction(proj,rg){
return proj._noAction && proj._noAction[rg.sectionId+'_'+rg.groupId+(rg.roomId||'')]===true;

function setGroupNoAction(proj,rg,val){
if(!proj._noAction)proj._noAction={};
proj._noAction[rg.sectionId+'_'+rg.groupId+(rg.roomId||'')]=val;

img.onload=()=>{
let w=img.width,h=img.height;
if(w>maxW){h*=maxW/w;w=maxW}
if(h>maxW){w*=maxW/h;h=maxW}
const c=document.createElement('canvas');c.width=w;c.height=h;
const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
resolve(c.toDataURL('image/jpeg',quality));
};
img.src=dataUrl;
});
}

function compressImageSmall(dataUrl){return compressImage(dataUrl,800,0.6)}

function parseSerialFromName(name){
const patterns=[/(?:SN|S\/N|SERIAL)[:\s]*([A-Z0-9][A-Z0-9\-]{4,})/i,/([A-Z]{2}\d{6,})/,/(\d{6,}[A-Z]{2,})/];
for(const p of patterns){const m=name.match(p);if(m)return m[1];}
return null;
}

function initPhotoSwipe(){
const grid=$('photoGrid');
if(!grid)return;
grid.querySelectorAll('.photo-item').forEach(el=>{
let startX=0,currentX=0,isDragging=false;
const onStart=function(e){const t=e.touches?e.touches[0]:e;startX=t.clientX;currentX=0;isDragging=true;el.style.transition='none'};
const onMove=function(e){if(!isDragging)return;const t=e.touches?e.touches[0]:e;currentX=t.clientX-startX;if(currentX<0)el.style.transform='translateX('+currentX+'px)'};
const onEnd=function(){if(!isDragging)return;isDragging=false;el.style.transition='transform .3s ease,opacity .3s ease';if(currentX<-80){el.classList.add('deleting');const idx=parseInt(el.dataset.index);setTimeout(()=>{if(!isNaN(idx)){const proj=getProject();if(proj&&proj.photos&&proj.photos[idx]){removePhoto(idx)}}},300)}else{el.style.transform=''}};
el.addEventListener('touchstart',onStart,{passive:true});
el.addEventListener('touchmove',onMove,{passive:true});
el.addEventListener('touchend',onEnd);
el.addEventListener('mousedown',onStart);
el.addEventListener('mousemove',onMove);
el.addEventListener('mouseup',onEnd);
el.addEventListener('mouseleave',function(e){if(isDragging&&currentX<0)onEnd()});
});
}

if(proj.photos&&proj.photos.length>0){

const files=[['repair_estimate.xlsx',xlsxData]];

const p=proj.photos[i];let src=p.data;

}
}

var zipFile;

files.forEach(f=>{z.file(f[0],f[1])});
zipFile=await z.generateAsync({type:'blob'});

saveBlob(zipFile,escHtml(proj.name).replace(/[^a-zA-Z0-9]/g,'_')+'_estimate.zip');

}catch(e){toast('Export failed: '+e.message)}
finally{btn.innerHTML=orig;btn.disabled=false}
}

$('csvInput').onchange=function(e){
const f=e.target.files&&e.target.files[0];
if(!f)return;
const r=new FileReader();
r.onload=function(){
try{
const text=r.result;
const lines=text.split('\n').filter(l=>l.trim());
let imported=0;
for(let i=1;i<lines.length;i++){
const parts=lines[i].split(',').map(s=>s.trim().replace(/^"|"$/g,''));
if(parts.length>=3){
const id=parts[0];const cost=parseFloat(parts[2]);
if(id&&!isNaN(cost)&&cost>=0){
const item=ITEMS.find(it=>it.id===id);
if(item){state.globalPrices[id]=cost;imported++}
}
}
}
saveState();renderSettings();rafRender();
toast('Imported '+imported+' prices');
}catch(err){toast('CSV parse error: '+err.message)}
};
r.readAsText(f);
e.target.value='';
};
